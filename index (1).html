<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
      --accent: #6ef0b0; --accent2: #3d8bff; --red: #f87171;
      --text: #e8e8f0; --muted: #7a7a99; --border: rgba(255,255,255,0.07);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    #root { min-height: 100vh; }

    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex; flex-direction: column; gap: 2rem;
    }
    .sidebar-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-nav { display: flex; flex-direction: column; gap: 0.4rem; }
    .nav-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 10px 14px; border-radius: 10px;
      cursor: pointer; font-size: 0.9rem; color: var(--muted);
      transition: all 0.2s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: rgba(110,240,176,0.1); color: var(--accent); font-weight: 500; }
    .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; font-size: 0.8rem; color: var(--muted); }

    /* Main */
    .main { padding: 2.5rem; overflow-y: auto; }
    .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .main-header h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    .main-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }

    /* Summary Cards */
    .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2rem; }
    .summary-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      position: relative; overflow: hidden;
    }
    .summary-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .summary-card.balance::before { background: var(--accent2); }
    .summary-card.income::before { background: var(--accent); }
    .summary-card.expense::before { background: var(--red); }
    .card-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; }
    .card-amount { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .card-amount.pos { color: var(--accent); }
    .card-amount.neg { color: var(--red); }
    .card-amount.neu { color: var(--accent2); }
    .card-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }

    /* Add Transaction */
    .add-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem; }
    .add-section h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 0.8rem; align-items: end; }
    .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
    .field input, .field select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--bg3); }
    .type-toggle { display: flex; gap: 0.4rem; }
    .type-btn {
      flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
      background: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
      color: var(--muted);
    }
    .type-btn.income.sel { background: rgba(110,240,176,0.15); color: var(--accent); border-color: var(--accent); }
    .type-btn.expense.sel { background: rgba(248,113,113,0.15); color: var(--red); border-color: var(--red); }
    .add-btn {
      padding: 10px 20px; background: var(--accent); color: #0a0a0f;
      border: none; border-radius: 8px; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.9rem; cursor: pointer; white-space: nowrap;
      transition: all 0.2s;
    }
    .add-btn:hover { background: #fff; transform: translateY(-1px); }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.2rem; margin-bottom: 2rem; }
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .chart-card h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; }

    /* Transactions List */
    .tx-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .tx-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
    .tx-header h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .tx-count { font-size: 0.8rem; color: var(--muted); background: var(--bg3); padding: 4px 12px; border-radius: 100px; }
    .tx-list { display: flex; flex-direction: column; gap: 0.6rem; max-height: 380px; overflow-y: auto; }
    .tx-list::-webkit-scrollbar { width: 4px; }
    .tx-list::-webkit-scrollbar-track { background: var(--bg3); border-radius: 2px; }
    .tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tx-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 12px; border-radius: 10px; background: var(--bg3);
      border: 1px solid transparent; transition: border-color 0.2s;
    }
    .tx-item:hover { border-color: var(--border); }
    .tx-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
    }
    .tx-icon.income { background: rgba(110,240,176,0.1); }
    .tx-icon.expense { background: rgba(248,113,113,0.1); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .tx-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .tx-amount.income { color: var(--accent); }
    .tx-amount.expense { color: var(--red); }
    .tx-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s; }
    .tx-del:hover { background: rgba(248,113,113,0.15); color: var(--red); }
    .tx-edit { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s; }
    .tx-edit:hover { background: rgba(110,240,176,0.1); color: var(--accent); }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }

    /* Edit Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 2rem; width: 420px; max-width: 90vw;
    }
    .modal h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
    .modal-footer { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .modal-btn { flex: 1; padding: 11px; border-radius: 8px; border: none; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .modal-btn.save { background: var(--accent); color: #0a0a0f; }
    .modal-btn.save:hover { background: #fff; }
    .modal-btn.cancel { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
    .modal-btn.cancel:hover { color: var(--text); }

    /* Responsive */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .form-row { grid-template-columns: 1fr 1fr; }
      .summary-cards { grid-template-columns: 1fr; }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CATEGORIES = {
  income: ['Salary','Freelance','Investment','Gift','Other Income'],
  expense: ['Food','Transport','Rent','Shopping','Health','Education','Entertainment','Utilities','Other']
};

const CAT_ICONS = {
  Salary:'💼', Freelance:'💻', Investment:'📈', Gift:'🎁', 'Other Income':'💰',
  Food:'🍔', Transport:'🚗', Rent:'🏠', Shopping:'🛍️', Health:'❤️',
  Education:'📚', Entertainment:'🎮', Utilities:'💡', Other:'📝'
};

// Load from localStorage or use seed data
function loadData() {
  try {
    const saved = localStorage.getItem('itc-finance-data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [
    { id: 1, type:'income', amount: 25000, category:'Salary', description:'Monthly salary', date:'2026-04-01' },
    { id: 2, type:'expense', amount: 8000, category:'Rent', description:'April rent', date:'2026-04-01' },
    { id: 3, type:'expense', amount: 1200, category:'Food', description:'Grocery run', date:'2026-04-02' },
    { id: 4, type:'income', amount: 5000, category:'Freelance', description:'Web project', date:'2026-04-03' },
    { id: 5, type:'expense', amount: 500, category:'Transport', description:'Ola/Uber', date:'2026-04-03' },
  ];
}

function BarChartComponent({ transactions }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    // Last 7 days
    const days = [];
    const incomeData = [];
    const expenseData = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const str = d.toISOString().split('T')[0];
      days.push(d.toLocaleDateString('en',{weekday:'short'}));
      const dayTx = transactions.filter(t => t.date === str);
      incomeData.push(dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0));
      expenseData.push(dayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0));
    }
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels: days,
        datasets: [
          { label:'Income', data: incomeData, backgroundColor:'rgba(110,240,176,0.7)', borderRadius: 6 },
          { label:'Expense', data: expenseData, backgroundColor:'rgba(248,113,113,0.7)', borderRadius: 6 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color:'#7a7a99', font:{ family:'DM Sans'} } } },
        scales: {
          x: { ticks:{ color:'#7a7a99' }, grid:{ color:'rgba(255,255,255,0.04)' } },
          y: { ticks:{ color:'#7a7a99', callback: v=>'₹'+v.toLocaleString() }, grid:{ color:'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }, [transactions]);
  return <canvas ref={ref} height={220}/>;
}

function DonutChartComponent({ transactions }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const expenses = transactions.filter(t => t.type==='expense');
    const byCategory = {};
    expenses.forEach(t => { byCategory[t.category] = (byCategory[t.category]||0) + t.amount; });
    const labels = Object.keys(byCategory);
    const data = Object.values(byCategory);
    const colors = ['#6ef0b0','#3d8bff','#f87171','#f59e0b','#a855f7','#10b981','#f472b6','#38bdf8','#fb923c'];
    if (labels.length === 0) return;
    chartRef.current = new Chart(ref.current, {
      type: 'doughnut',
      data: { labels, datasets:[{ data, backgroundColor: colors.slice(0,labels.length), borderWidth:0, hoverOffset:6 }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout:'70%',
        plugins: { legend: { position:'bottom', labels:{ color:'#7a7a99', font:{family:'DM Sans'}, padding:12, boxWidth:12 } } }
      }
    });
  }, [transactions]);
  if (transactions.filter(t=>t.type==='expense').length === 0)
    return <div style={{textAlign:'center',padding:'3rem',color:'var(--muted)',fontSize:'0.85rem'}}>No expense data yet</div>;
  return <canvas ref={ref} height={220}/>;
}

function App() {
  const [transactions, setTransactions] = useState(loadData);
  const [form, setForm] = useState({ type:'expense', amount:'', category:'Food', description:'', date: new Date().toISOString().split('T')[0] });
  const [editTx, setEditTx] = useState(null);
  const [view, setView] = useState('dashboard');

  useEffect(() => {
    localStorage.setItem('itc-finance-data', JSON.stringify(transactions));
  }, [transactions]);

  const totalIncome = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = totalIncome - totalExpense;

  function addTransaction() {
    if (!form.amount || !form.description) return;
    const tx = { ...form, id: Date.now(), amount: parseFloat(form.amount) };
    setTransactions(prev => [tx, ...prev]);
    setForm(f => ({ ...f, amount:'', description:'' }));
  }

  function deleteTransaction(id) {
    setTransactions(prev => prev.filter(t => t.id !== id));
  }

  function saveEdit() {
    setTransactions(prev => prev.map(t => t.id === editTx.id ? editTx : t));
    setEditTx(null);
  }

  const fmt = n => '₹' + n.toLocaleString('en-IN');

  return (
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-logo">Finance<span>.</span></div>
        <nav className="sidebar-nav">
          {[['dashboard','📊','Dashboard'],['transactions','📋','Transactions'],['analytics','📈','Analytics']].map(([id,icon,label])=>(
            <button key={id} className={`nav-item ${view===id?'active':''}`} onClick={()=>setView(id)}>
              <span className="icon">{icon}</span> {label}
            </button>
          ))}
        </nav>
        <div className="sidebar-bottom">
          <div style={{marginBottom:'0.3rem',fontWeight:500,color:'var(--text)'}}>ITC Finance Tracker</div>
          <div>Assignment · Task 2</div>
        </div>
      </aside>

      {/* Main Content */}
      <main className="main">
        <div className="main-header">
          <div>
            <h1>{view==='dashboard'?'Dashboard':view==='transactions'?'Transactions':'Analytics'}</h1>
            <p>{new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
          </div>
        </div>

        {/* Summary Cards */}
        <div className="summary-cards">
          <div className="summary-card balance">
            <div className="card-label">Current Balance</div>
            <div className={`card-amount ${balance>=0?'neu':'neg'}`}>{fmt(Math.abs(balance))}</div>
            <div className="card-sub">{balance >= 0 ? '↑ Positive balance' : '↓ Negative balance'}</div>
          </div>
          <div className="summary-card income">
            <div className="card-label">Total Income</div>
            <div className="card-amount pos">{fmt(totalIncome)}</div>
            <div className="card-sub">{transactions.filter(t=>t.type==='income').length} transactions</div>
          </div>
          <div className="summary-card expense">
            <div className="card-label">Total Expenses</div>
            <div className="card-amount neg">{fmt(totalExpense)}</div>
            <div className="card-sub">{transactions.filter(t=>t.type==='expense').length} transactions</div>
          </div>
        </div>

        {/* Add Form */}
        <div className="add-section">
          <h2>Add Transaction</h2>
          <div className="form-row">
            <div className="field">
              <label>Type</label>
              <div className="type-toggle">
                <button className={`type-btn income ${form.type==='income'?'sel':''}`}
                  onClick={()=>setForm(f=>({...f,type:'income',category:'Salary'}))}>Income</button>
                <button className={`type-btn expense ${form.type==='expense'?'sel':''}`}
                  onClick={()=>setForm(f=>({...f,type:'expense',category:'Food'}))}>Expense</button>
              </div>
            </div>
            <div className="field">
              <label>Amount (₹)</label>
              <input type="number" placeholder="0.00" value={form.amount}
                onChange={e=>setForm(f=>({...f,amount:e.target.value}))} min="0"/>
            </div>
            <div className="field">
              <label>Category</label>
              <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {CATEGORIES[form.type].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Description</label>
              <input type="text" placeholder="What's this for?" value={form.description}
                onChange={e=>setForm(f=>({...f,description:e.target.value}))}
                onKeyDown={e=>e.key==='Enter'&&addTransaction()}/>
            </div>
            <button className="add-btn" onClick={addTransaction}>+ Add</button>
          </div>
        </div>

        {/* Charts (dashboard & analytics) */}
        {(view==='dashboard'||view==='analytics') && (
          <div className="charts-row">
            <div className="chart-card">
              <h3>Income vs Expenses — Last 7 Days</h3>
              <BarChartComponent transactions={transactions}/>
            </div>
            <div className="chart-card">
              <h3>Spending by Category</h3>
              <DonutChartComponent transactions={transactions}/>
            </div>
          </div>
        )}

        {/* Transactions List */}
        {(view==='dashboard'||view==='transactions') && (
          <div className="tx-section">
            <div className="tx-header">
              <h2>Recent Transactions</h2>
              <span className="tx-count">{transactions.length} total</span>
            </div>
            <div className="tx-list">
              {transactions.length === 0 && (
                <div className="empty-state">No transactions yet. Add one above!</div>
              )}
              {transactions.map(tx => (
                <div className="tx-item" key={tx.id}>
                  <div className={`tx-icon ${tx.type}`}>{CAT_ICONS[tx.category]||'💸'}</div>
                  <div className="tx-info">
                    <div className="tx-name">{tx.description}</div>
                    <div className="tx-meta">{tx.category} · {tx.date}</div>
                  </div>
                  <div className={`tx-amount ${tx.type}`}>
                    {tx.type==='income'?'+':'-'}{fmt(tx.amount)}
                  </div>
                  <button className="tx-edit" onClick={()=>setEditTx({...tx})}>✏️</button>
                  <button className="tx-del" onClick={()=>deleteTransaction(tx.id)}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* Edit Modal */}
      {editTx && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditTx(null)}>
          <div className="modal">
            <h3>Edit Transaction</h3>
            {[['amount','number','Amount (₹)'],['description','text','Description'],['date','date','Date']].map(([field,type,label])=>(
              <div className="field" key={field} style={{marginBottom:'1rem'}}>
                <label>{label}</label>
                <input type={type} value={editTx[field]}
                  onChange={e=>setEditTx(t=>({...t,[field]:field==='amount'?parseFloat(e.target.value)||0:e.target.value}))}/>
              </div>
            ))}
            <div className="field" style={{marginBottom:'1rem'}}>
              <label>Category</label>
              <select value={editTx.category} onChange={e=>setEditTx(t=>({...t,category:e.target.value}))}>
                {CATEGORIES[editTx.type].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="modal-footer">
              <button className="modal-btn cancel" onClick={()=>setEditTx(null)}>Cancel</button>
              <button className="modal-btn save" onClick={saveEdit}>Save Changes</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
